name: Terraform CI

# Two-phase leaf-folder automation:
#
#   Phase 1 — apply all provider/ leaves (creates/updates prefix lists in AWS)
#   Phase 2 — apply all consumer/ leaves AFTER provider is done
#             (data sources re-run, discover new/changed lists, update SG rules)
#
# This ordering guarantees that prefix lists exist in AWS before any consumer
# tries to discover them by tag or owner_id.
#
# Trigger:
#   PR        → plan every leaf, upload plan artifacts
#   Merge     → apply provider leaves, then consumer leaves
#   Schedule  → daily consumer-only reconcile (catches new lists created
#               outside this repo, or drift from console edits)

on:
  pull_request:
    paths:
      - 'provider/**'
      - 'consumer/**'
      - 'modules/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'provider/**'
      - 'consumer/**'
      - 'modules/**'
  schedule:
    - cron: '0 6 * * 1-5'  # weekdays 06:00 UTC — consumer reconcile only

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # Discover leaves, split by provider vs consumer.
  # -------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      provider_leaves: ${{ steps.find.outputs.provider_leaves }}
      consumer_leaves: ${{ steps.find.outputs.consumer_leaves }}
      all_leaves: ${{ steps.find.outputs.all_leaves }}
    steps:
      - uses: actions/checkout@v4

      - name: Find CI-enabled leaf folders
        id: find
        run: |
          # A leaf is CI-enabled if it contains both versions.tf AND a .ci
          # marker file. Template leaves (no .ci) are skipped. To enable CI
          # for a new leaf, add an empty .ci file: touch <leaf>/.ci
          find_leaves() {
            find "$1" -name '.ci' -not -path '*/.terraform/*' \
              | xargs -n1 dirname | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0)) | map({path: ., name: (. | gsub("/"; "-"))})'
          }
          provider_leaves=$(find_leaves provider)
          consumer_leaves=$(find_leaves consumer)
          all_leaves=$(echo "[$provider_leaves, $consumer_leaves]" | jq -c 'flatten')

          echo "provider_leaves=$provider_leaves" >> "$GITHUB_OUTPUT"
          echo "consumer_leaves=$consumer_leaves" >> "$GITHUB_OUTPUT"
          echo "all_leaves=$all_leaves" >> "$GITHUB_OUTPUT"

          echo "Provider leaves:" && echo "$provider_leaves" | jq .
          echo "Consumer leaves:" && echo "$consumer_leaves" | jq .

  # -------------------------------------------------------------------
  # PR: plan every leaf (provider + consumer, in parallel).
  # -------------------------------------------------------------------
  plan:
    if: github.event_name == 'pull_request'
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leaf: ${{ fromJson(needs.discover.outputs.all_leaves) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.leaf.name)] || secrets.AWS_ROLE_DEFAULT }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: ${{ matrix.leaf.path }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ matrix.leaf.path }}
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "### ${{ matrix.leaf.path }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^(Plan:|No changes)' plan.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.leaf.name }}
          path: |
            ${{ matrix.leaf.path }}/tfplan
            ${{ matrix.leaf.path }}/plan.txt

  # -------------------------------------------------------------------
  # Merge: Phase 1 — apply provider leaves.
  # Creates/updates prefix lists in AWS before consumers try to find them.
  # -------------------------------------------------------------------
  apply-provider:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        leaf: ${{ fromJson(needs.discover.outputs.provider_leaves) }}
    concurrency:
      group: tf-apply-${{ matrix.leaf.name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.leaf.name)] || secrets.AWS_ROLE_DEFAULT }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: ${{ matrix.leaf.path }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ matrix.leaf.path }}
        run: terraform apply -input=false -auto-approve

  # -------------------------------------------------------------------
  # Merge: Phase 2 — apply consumer leaves AFTER provider is done.
  # Data sources re-run, discover new/changed lists, update SG rules.
  # Also runs on schedule for daily reconcile (no provider phase needed).
  # -------------------------------------------------------------------
  apply-consumer:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule'
    needs: [discover, apply-provider]
    # When triggered by schedule, apply-provider is skipped (no provider
    # leaves to apply). The 'if' on apply-provider prevents it from running,
    # and needs[] with a skipped job still allows this job to proceed.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        leaf: ${{ fromJson(needs.discover.outputs.consumer_leaves) }}
    concurrency:
      group: tf-apply-${{ matrix.leaf.name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.leaf.name)] || secrets.AWS_ROLE_DEFAULT }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: ${{ matrix.leaf.path }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ matrix.leaf.path }}
        run: terraform apply -input=false -auto-approve
