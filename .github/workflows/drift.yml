name: Terraform Drift Detection

# Nightly drift scan — runs plan -detailed-exitcode on every leaf folder.
# Exit code 2 = drift. Opens an issue if any leaf drifts.
#
# Why this exists: the entire pitch is "network team edits one file and
# every consumer SG updates automatically." If someone manually edits a
# prefix list in the AWS console, Terraform state diverges silently and
# the next `apply` would revert the change. Drift detection makes this
# visible within 24h instead of "whenever someone notices."

on:
  schedule:
    - cron: '17 3 * * *'  # 03:17 UTC daily
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      leaves: ${{ steps.find.outputs.leaves }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          leaves=$(find provider consumer -name versions.tf -not -path '*/modules/*' -not -path '*/.terraform/*' \
            | xargs -n1 dirname \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0)) | map({path: ., name: (. | gsub("/"; "-"))})')
          echo "leaves=$leaves" >> "$GITHUB_OUTPUT"

  drift:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leaf: ${{ fromJson(needs.discover.outputs.leaves) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.leaf.name)] || secrets.AWS_ROLE_DEFAULT }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: ${{ matrix.leaf.path }}
        run: terraform init -input=false

      - name: Terraform plan (drift check)
        id: plan
        working-directory: ${{ matrix.leaf.path }}
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -no-color -out=drift.tfplan > drift.txt 2>&1
          code=$?
          set -e
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          case "$code" in
            0) echo "✅ no drift" ;;
            1) echo "❌ plan errored"; cat drift.txt; exit 1 ;;
            2) echo "⚠️ drift detected"; cat drift.txt ;;
          esac

      - name: Open drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ matrix.leaf.path }}/drift.txt';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '(plan output missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected: ${{ matrix.leaf.path }}`,
              body: "Leaf: `${{ matrix.leaf.path }}`\n\n```\n" + body.slice(0, 55000) + "\n```",
              labels: ['drift', 'terraform'],
            });
